databaseChangeLog:
  - logicalFilePath: liquibase/changelog/0.0.1/changelog-0.0.1.yml

  - changeSet:
      id: create-evaluation-schema
      author: 0.0.1
      changes:
        - sqlFile:
            path: ddl/create-evaluation-schema.sql
            relativeToChangelogFile: true
            splitStatements: true
            stripComments: true
      rollback:
        - sqlFile:
            path: ddl/create-evaluation-schema-rollback.sql
            relativeToChangelogFile: true
            splitStatements: true
            stripComments: true
