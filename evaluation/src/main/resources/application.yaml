spring:
  application:
    name: evaluation
  datasource:
    url: ${EVALUATION_DB_URL:jdbc:postgresql://localhost:5432/medic_evaluation}
    username: ${EVALUATION_DB_USERNAME:medic}
    password: ${EVALUATION_DB_PASSWORD:medic}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  liquibase:
    change-log: classpath:liquibase/changelog/changelog.yml
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

server:
  port: ${EVALUATION_PORT:8090}

security:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-to-at-least-32-bytes}
