spring:
  application:
    name: retrieval
  datasource:
    url: ${RETRIEVAL_DB_URL:jdbc:postgresql://localhost:5432/medic_retrieval}
    username: ${RETRIEVAL_DB_USERNAME:medic}
    password: ${RETRIEVAL_DB_PASSWORD:medic}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  liquibase:
    change-log: classpath:liquibase/changelog/changelog.yml
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

server:
  port: ${RETRIEVAL_PORT:8088}

security:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-to-at-least-32-bytes}

search:
  index:
    enabled: ${SEARCH_INDEX_ENABLED:true}
    url: ${OPENSEARCH_URL:http://localhost:9200}
    name: ${OPENSEARCH_INDEX_NAME:medical-ai-chunks}
