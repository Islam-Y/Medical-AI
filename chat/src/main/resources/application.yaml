spring:
  application:
    name: chat
  datasource:
    url: ${CHAT_DB_URL:jdbc:postgresql://localhost:5432/medic_chat}
    username: ${CHAT_DB_USERNAME:medic}
    password: ${CHAT_DB_PASSWORD:medic}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  liquibase:
    change-log: classpath:liquibase/changelog/changelog.yml
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

server:
  port: ${CHAT_PORT:8086}

security:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-to-at-least-32-bytes}

outbox:
  publisher:
    fixed-delay-ms: ${OUTBOX_FIXED_DELAY_MS:5000}
