spring:
  application:
    name: consent
  datasource:
    url: ${CONSENT_DB_URL:jdbc:postgresql://localhost:5432/medic_consent}
    username: ${CONSENT_DB_USERNAME:medic}
    password: ${CONSENT_DB_PASSWORD:medic}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  liquibase:
    change-log: classpath:liquibase/changelog/changelog.yml
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

server:
  port: ${CONSENT_PORT:8091}

security:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-to-at-least-32-bytes}
