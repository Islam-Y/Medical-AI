spring:
  application:
    name: indexing
  datasource:
    url: ${INDEXING_DB_URL:jdbc:postgresql://localhost:5432/medic_indexing}
    username: ${INDEXING_DB_USERNAME:medic}
    password: ${INDEXING_DB_PASSWORD:medic}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  liquibase:
    change-log: classpath:liquibase/changelog/changelog.yml
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

server:
  port: ${INDEXING_PORT:8089}

security:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-to-at-least-32-bytes}
