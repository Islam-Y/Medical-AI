spring:
  application:
    name: indexing
  datasource:
    url: ${INDEXING_DB_URL:jdbc:postgresql://localhost:5432/medic_indexing}
    username: ${INDEXING_DB_USERNAME:medic}
    password: ${INDEXING_DB_PASSWORD:medic}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  liquibase:
    change-log: classpath:liquibase/changelog/changelog.yml
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

server:
  port: ${INDEXING_PORT:8089}

security:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-to-at-least-32-bytes}

object-storage:
  endpoint: ${OBJECT_STORAGE_ENDPOINT:http://localhost:9000}
  region: ${OBJECT_STORAGE_REGION:us-east-1}
  access-key: ${OBJECT_STORAGE_ACCESS_KEY:medicadmin}
  secret-key: ${OBJECT_STORAGE_SECRET_KEY:medicadmin123}
  path-style-access: ${OBJECT_STORAGE_PATH_STYLE_ACCESS:true}

search:
  index:
    enabled: ${SEARCH_INDEX_ENABLED:true}
    url: ${OPENSEARCH_URL:http://localhost:9200}
    name: ${OPENSEARCH_INDEX_NAME:medical-ai-chunks}
