name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - feature/backend-mvp-core

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Run tests and coverage
        run: ./gradlew clean test jacocoTestCoverageVerification
