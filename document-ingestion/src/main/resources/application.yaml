spring:
  application:
    name: document-ingestion
  datasource:
    url: ${DOCUMENT_INGESTION_DB_URL:jdbc:postgresql://localhost:5432/medic_document_ingestion}
    username: ${DOCUMENT_INGESTION_DB_USERNAME:medic}
    password: ${DOCUMENT_INGESTION_DB_PASSWORD:medic}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  liquibase:
    change-log: classpath:liquibase/changelog/changelog.yml
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  servlet:
    multipart:
      max-file-size: ${DOCUMENT_MAX_FILE_SIZE:20MB}
      max-request-size: ${DOCUMENT_MAX_REQUEST_SIZE:25MB}

server:
  port: ${DOCUMENT_INGESTION_PORT:8084}

security:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-to-at-least-32-bytes}

object-storage:
  endpoint: ${OBJECT_STORAGE_ENDPOINT:http://localhost:9000}
  region: ${OBJECT_STORAGE_REGION:us-east-1}
  access-key: ${OBJECT_STORAGE_ACCESS_KEY:medicadmin}
  secret-key: ${OBJECT_STORAGE_SECRET_KEY:medicadmin123}
  path-style-access: ${OBJECT_STORAGE_PATH_STYLE_ACCESS:true}
  buckets:
    original-documents: ${OBJECT_STORAGE_ORIGINAL_DOCUMENTS_BUCKET:medical-ai-documents}
    extracted-artifacts: ${OBJECT_STORAGE_EXTRACTED_ARTIFACTS_BUCKET:medical-ai-extractions}

outbox:
  publisher:
    fixed-delay-ms: ${OUTBOX_FIXED_DELAY_MS:5000}
