spring:
  application:
    name: user
  datasource:
    url: ${USER_DB_URL:jdbc:postgresql://localhost:5432/medic_user}
    username: ${USER_DB_USERNAME:medic}
    password: ${USER_DB_PASSWORD:medic}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  liquibase:
    change-log: classpath:liquibase/changelog/changelog.yml
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

server:
  port: ${USER_PORT:8082}

security:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-to-at-least-32-bytes}

outbox:
  publisher:
    fixed-delay-ms: ${OUTBOX_FIXED_DELAY_MS:5000}
