spring:
  application:
    name: health-record
  datasource:
    url: ${HEALTH_RECORD_DB_URL:jdbc:postgresql://localhost:5432/medic_health_record}
    username: ${HEALTH_RECORD_DB_USERNAME:medic}
    password: ${HEALTH_RECORD_DB_PASSWORD:medic}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  liquibase:
    change-log: classpath:liquibase/changelog/changelog.yml
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

server:
  port: ${HEALTH_RECORD_PORT:8083}

security:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-to-at-least-32-bytes}

outbox:
  publisher:
    fixed-delay-ms: ${OUTBOX_FIXED_DELAY_MS:5000}
