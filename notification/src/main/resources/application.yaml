spring:
  application:
    name: notification
  datasource:
    url: ${NOTIFICATION_DB_URL:jdbc:postgresql://localhost:5432/medic_notification}
    username: ${NOTIFICATION_DB_USERNAME:medic}
    password: ${NOTIFICATION_DB_PASSWORD:medic}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  liquibase:
    change-log: classpath:liquibase/changelog/changelog.yml
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

server:
  port: ${NOTIFICATION_PORT:8087}

security:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-to-at-least-32-bytes}

outbox:
  publisher:
    fixed-delay-ms: ${OUTBOX_FIXED_DELAY_MS:5000}
